# CPR Market Sentiment Analysis Configuration

# ── Strike-mode selector ─────────────────────────────────────────────────────
# STRIKE_MODE is read from backtesting_config.yaml (single source of truth).
# Set here only when running these scripts standalone, independently of the
# backtesting workflow.  backtesting_config.yaml takes precedence when present.
# BOTH = run sentiment for the same date(s) in both data_st50 and data_st100.
STRIKE_MODE: BOTH   # ST50 | ST100 | BOTH

STRIKE_MODE_SETTINGS:
  ST50:
    DATA_DIR: data_st50
  ST100:
    DATA_DIR: data_st100
  # BOTH: no single DATA_DIR; process_sentiment runs for both dirs
# ─────────────────────────────────────────────────────────────────────────────

# Optional: generate_cpr_dates.py "new day only" mode.
# Set to a single date (YYYY-MM-DD) to fetch only that date: appended at end of cpr_dates.csv
# if new; same row updated if run twice for the same date. Comment out for full run.
# For MAR02 expiry use 2026-02-25. Comment out for full run.

# ── Strike-mode selector ─────────────────────────────────────────────────────
# Change STRIKE_MODE to switch between ST50 and ST100 datasets in one step.
# This controls DATA_DIR, BACKTESTING_DAYS, STRIKE_DIFFERENCE and RANGE_SIZE.
STRIKE_MODE: ST50   # ST50 | ST100

STRIKE_MODE_SETTINGS:
  ST50:
    DATA_DIR: data_st50
    STRIKE_DIFFERENCE: 50
    RANGE_SIZE: 50
  ST100:
    DATA_DIR: data_st100
    STRIKE_DIFFERENCE: 100
    RANGE_SIZE: 100

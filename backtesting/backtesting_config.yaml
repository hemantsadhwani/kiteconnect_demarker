  INCLUDE_SENTIMENT_COLUMNS: false
MARKET_SENTIMENT_FILTER:
  ENABLED: true
  MODE: HYBRID
  SENTIMENT_VERSION: v5
  HYBRID_STRICT_ZONE: R1_S1
  MANUAL_SENTIMENT: NEUTRAL
  ALLOW_MULTIPLE_SYMBOL_POSITIONS: false
MARK2MARKET:
  ENABLE: true
  CAPITAL: 100000
  LOSS_MARK: 30
  PER_DAY: true
  USE_START_CAPITAL_FOR_LIMIT: false
STRATEGY:
  CE_ENTRY_CONDITIONS:
    useEntry1: false
    useEntry2: true
    useEntry3: false
  PE_ENTRY_CONDITIONS:
    useEntry1: false
    useEntry2: true
    useEntry3: false
# Set false for time zones to exclude those trades from Filtered P&L. Requires full workflow re-run.
# APPLY_AT_ENTRY: false = strategy enters in all zones; exclusion happens in sentiment filter so Filtered P&L improves.
# APPLY_AT_ENTRY: true = strategy does not enter in disabled zones (Filtered P&L unchanged).
TIME_DISTRIBUTION_FILTER:
  ENABLED: true
  APPLY_AT_ENTRY: false
  TIME_ZONES:
    09:15-10:00: true
    10:00-11:00: true
    11:00-12:00: true
    12:00-13:00: false
    13:00-14:00: true
    14:00-15:30: false
TRADING:
  EOD_EXIT: true
  EOD_EXIT_TIME: '15:14'
  MAX_POSITIONS: 1
  POSITION_SIZE: 1
ENTRY1:
  TAKE_PROFIT_PERCENT: 6.0
ENTRY2:
  DEMARKER_CONFIRMATION_WINDOW: 3
  WPR_CONFIRMATION_WINDOW: 4
  OPTIMAL_ENTRY_ABOVE_CONFIRM_OPEN: true
  OPTIMAL_ENTRY_WPR_INVALIDATE: false
  SL_MODE: Fixed Percentage #Swing Low 
  TRIGGER: WPR  #DEMARKER #WPR 
  # When true (default): exit Entry2 DeMarker trade if DeMarker goes below DEMARKER_OVERSOLD; reset state so new trigger can initiate next bar
  EXIT_WHEN_DEMARKER_BELOW_OVERSOLD: true
  TRIGGER_REQUIRE_SUPERTREND_BEARISH: true
  FLEXIBLE_STOCHRSI_CONFIRMATION: true
  TAKE_PROFIT_PERCENT: 8.0
  STOP_LOSS_PRICE_THRESHOLD:
  - 120
  - 40
  STOP_LOSS_PERCENT:
    ABOVE_THRESHOLD: 6.5
    BETWEEN_THRESHOLD: 9.5
    BELOW_THRESHOLD: 8.0
  VALIDATE_ENTRY_RISK: true
  REVERSAL_MAX_SWING_LOW_DISTANCE_PERCENT:
    ABOVE_THRESHOLD: 14
    BETWEEN_THRESHOLD: 19
    BELOW_THRESHOLD: 20
  SKIP_FIRST: false
  EXIT_WEAK_SIGNAL: true
  EXIT_WEAK_SIGNAL_PROFIT_PCT: 7.0
  EXIT_WEAK_SIGNAL_DEMARKER_R_BAND: 0.6
  DYNAMIC_TRAILING_WPR9: false
  DYNAMIC_TRAILING_MA: true
  DYNAMIC_TRAILING_MA_THRESH: 7
  WPR_INVALIDATION: true
  ST_STOP_LOSS_PERCENT: true
  ST_SL_WHEN_TRAILING_TP: true
  SL_TO_PRICE: false
  HIGH_PRICE_THRESHOLD: 120
  HIGH_PRICE_PERCENT:
    ABOVE_THRESHOLD: 6.0
    BELOW_THRESHOLD: 7.0

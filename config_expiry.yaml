# Trade Configuration — EXPIRY (aligned with backtesting_expiry/backtesting_config.yaml)
TRADE_SETTINGS:
  # Common Settings
  QUANTITY: 65 # Nifty 50 current lot size
  CAPITAL: 12000 # Max capital to use per trade
  PRODUCT: "NRML" # NRML is required for GTT orders
  
  # Entry Risk Validation (Pre-Entry Risk Assessment)
  VALIDATE_ENTRY_RISK: true # Enable entry risk validation before trade
  # Price-based REVERSAL_MAX_SWING_LOW_DISTANCE_PERCENT (aligned with backtesting_expiry ENTRY2)
  REVERSAL_MAX_SWING_LOW_DISTANCE_PERCENT:
    ABOVE_THRESHOLD: 20  # Max swing low distance % when entry price > threshold (backtest: 20)
    BETWEEN_THRESHOLD: 25 # Max swing low distance % when entry price between thresholds (backtest: 20)
    BELOW_THRESHOLD: 25  # Max swing low distance % when entry price < threshold (backtest: 20)
  CONTINUATION_MAX_SUPERTREND_DISTANCE_PERCENT: 6 # Max SuperTrend distance for CONTINUATION entries (useEntry3)
  
  # Stop Loss Mode for Entry2 (backtesting_expiry: "Swing Low")
  # "Fixed Percentage" = use STOP_LOSS_PERCENT below; "Swing Low" = use trailing swing low (SL_SWING_CANDLES)
  SL_MODE: "Swing Low"  # "Fixed Percentage" | "Swing Low"
  # When SL_MODE is "Swing Low": min(low) over the last SL_SWING_CANDLES candles only (no future data)
  SL_SWING_CANDLES: 5

  # Price-based Stop Loss Configuration (used when SL_MODE is "Fixed Percentage"; aligned with backtesting_expiry ENTRY2)
  STOP_LOSS_PRICE_THRESHOLD: [140, 40] # Price thresholds for stop loss selection [high, low]
  STOP_LOSS_PERCENT:
    ABOVE_THRESHOLD: 6.5   # Stop loss % when entry price > 140 (backtest: 6.5)
    BETWEEN_THRESHOLD: 8.0 # Stop loss % when entry price between 40 and 140 (backtest: 8.0)
    BELOW_THRESHOLD: 8.0   # Stop loss % when entry price < 40 (backtest: 8.0)
  TAKE_PROFIT_PERCENT: 8.0 # Fixed percentage take profit (backtest: 8.0; redundant if DYNAMIC_TRAILING_MA is active)
  # Dynamic Trailing MA Configuration (Stage 3)
  DYNAMIC_TRAILING_MA: true
  DYNAMIC_TRAILING_MA_THRESH: 7
  # EXIT_WEAK_SIGNAL (R1-R2 zone only): when high >= 7%, if DeMarker < R_BAND exit at 7% else start trailing
  EXIT_WEAK_SIGNAL: false
  EXIT_WEAK_SIGNAL_PROFIT_PCT: 7.0
  EXIT_WEAK_SIGNAL_DEMARKER_R_BAND: 0.60
  # Entry Conditions (backtesting_expiry: Entry2 only for CE and PE)
  CE_ENTRY_CONDITIONS:
    useEntry1: false
    useEntry2: true
    useEntry3: false
  PE_ENTRY_CONDITIONS:
    useEntry1: false
    useEntry2: true
    useEntry3: false

  ENTRY2_CONFIRMATION_WINDOW: 4 # WPR window (backtest: WPR_CONFIRMATION_WINDOW: 4)
  FLEXIBLE_STOCHRSI_CONFIRMATION: true
  DEBUG_ENTRY2: false
  SKIP_FIRST: false

  # Optimal entry: defer Entry2; enter when a later candle opens above confirmation high; invalidate if SL breached (backtesting_expiry: true)
  OPTIMAL_ENTRY_ABOVE_CONFIRM_OPEN: true
  OPTIMAL_ENTRY_WPR_INVALIDATE: false
  WPR_INVALIDATION: false

# High-Water Mark Trailing Stop (aligned with backtesting_expiry MARK2MARKET)
# LOSS_MARK: 30 when MODE HYBRID; USE_START_CAPITAL_FOR_LIMIT: false = limit from day high (HWM)
MARK2MARKET:
  ENABLE: true
  CAPITAL: 12000
  LOSS_MARK: 30   # Backtest: 30 when MODE HYBRID
  PER_DAY: true
  USE_START_CAPITAL_FOR_LIMIT: false  # false = stop when capital < HWM*(1-LOSS_MARK/100)

# Bot Operational Settings (backtest EOD_EXIT_TIME: '15:14')
TRADING_HOURS:
  START_HOUR: 9
  START_MINUTE: 15
  END_HOUR: 15
  END_MINUTE: 14

MARKET_CLOSE:
  HOUR: 15
  MINUTE: 14

# CPR-derived trading range (aligned with backtesting_expiry: pivot columns R2 / S3)
# Entry only when Nifty at entry is between CPR_LOWER and CPR_UPPER.
CPR_TRADING_RANGE:
  ENABLED: true
  CPR_UPPER: "R2"   # Pivot column (backtest: R2)
  CPR_LOWER: "S3"   # Pivot column (backtest: S3)

CPR_WIDTH_FILTER:
  ENABLED: false
  THRESHOLD: 62  # Backtest: CPR_WIDTH_SIZE: 62

# Time Distribution Filter (aligned with backtesting_expiry: all zones true 09:15-15:30)
TIME_DISTRIBUTION_FILTER:
  ENABLED: true
  TIME_ZONES:
    09:15-10:00: true
    10:00-11:00: true
    11:00-12:00: true
    12:00-13:00: false
    13:00-14:00: true
    14:00-15:30: true

# File Paths for State and Control
SENTIMENT_FILE_PATH: "output/market_sentiment.txt"
TRADE_STATE_FILE_PATH: "output/trade_state.json"
SUBSCRIBE_TOKENS_FILE_PATH: "output/subscribe_tokens.json"

# Indicator Configuration
INDICATORS:
  SUPERTREND:
    ATR_LENGTH: 10
    FACTOR: 2.5
  WPR_FAST_LENGTH: 9
  WPR_SLOW_LENGTH: 28
  SToch_RSI:
    K: 3
    D: 3
    RSI_LENGTH: 14
    STOCH_PERIOD: 14
  FAST_MA:
    MA: sma
    LENGTH: 11
  SLOW_MA:
    MA: sma
    LENGTH: 13
  SWING_LOW_PERIOD: 5
  DEMARKER:
    PERIOD: 14  # Same as backtesting (run_indicators.py / indicators_backtesting.py)

# Threshold Configuration for Entry Conditions
# NOTE: THRESHOLDS are now in backtesting/indicators_config.yaml (preferred location)
# This section is kept for backward compatibility only
# The code will load from indicators_config.yaml first, then fallback to this section
THRESHOLDS:
  WPR_FAST_OVERSOLD: -79    # Fast Williams %R oversold threshold (default: -80)
                            # WPR9 must cross above this value to trigger Entry2
  WPR_SLOW_OVERSOLD: -74    # Slow Williams %R oversold threshold (default: -80)
                            # WPR28 must cross above this value to trigger Entry2
  STOCH_RSI_OVERSOLD: 20 # Stochastic RSI oversold threshold (default: 20)
                         # StochK must be above this value AND above StochD to trigger Entry2

# Dynamic ATM Configuration
# Controls whether ATM strikes adjust intraday based on NIFTY price movements
DYNAMIC_ATM:
  ENABLED: true          # Set to false to use static ATM (strikes calculated once at market open)
  SLAB_CHANGE_ALERT: true # Log alerts when slab changes occur
  MIN_SLAB_CHANGE_INTERVAL: 180  # Minimum seconds between slab changes (prevents rapid switching)

# Strike Difference Configuration
# Controls the strike interval for ATM/OTM strike calculation
# Options: 50 (default, multiples of 50) or 100 (multiples of 100)
# For STRIKE_DIFFERENCE=50: CE = floor(price/50)*50, PE = ceil(price/50)*50
# For STRIKE_DIFFERENCE=100: CE = floor(price/100)*100, PE = ceil(price/100)*100
# Example: NIFTY=25510, STRIKE_DIFFERENCE=100 -> CE=25500, PE=25600
STRIKE_DIFFERENCE: 50  # Options: 50 or 100

# Strike Type Configuration
# Controls whether to use ATM (At-The-Money) or OTM (Out-of-The-Money) strike selection
# ATM: CE = FLOOR (at or below price), PE = CEIL (at or above price)
# OTM: PE = FLOOR (at or below price), CE = CEIL (at or above price)
# Example: NIFTY=25123.45, STRIKE_DIFFERENCE=50
#   ATM: CE=25100 (floor), PE=25150 (ceil)
#   OTM: PE=25100 (floor), CE=25150 (ceil)
STRIKE_TYPE: ATM  # Options: ATM or OTM

# Price Zone Filter Configuration
# Filters trades based on entry price - only takes trades if entry price is within specified range
# Based on backtesting win rate analysis
PRICE_ZONES:
  DYNAMIC_ATM:
    LOW_PRICE: 20   # Minimum entry price to take trade
    HIGH_PRICE: 200 # Maximum entry price to take trade
  STATIC_ATM:
    LOW_PRICE: 20    # Minimum entry price (0 = no lower limit)
    HIGH_PRICE: 200 # Maximum entry price (500 = no upper limit for now)

# Market Sentiment Configuration (aligned with backtesting_expiry MARKET_SENTIMENT_FILTER)
# HYBRID: strict sentiment only when Nifty at entry is in R1_S1; outside = NEUTRAL (both CE and PE allowed).
MARKET_SENTIMENT:
  MODE: HYBRID  # Backtest: HYBRID
  HYBRID_STRICT_ZONE: R1_S1

  SENTIMENT_VERSION: "v5"
  CONFIG_PATH: "market_sentiment_v5/config.yaml"

  MANUAL_SENTIMENT: NEUTRAL  # Used when MODE=MANUAL

  ALLOW_MULTIPLE_SYMBOL_POSITIONS: true  # Backtest: true (CE and PE can coexist)

# Real-Time Position Management Configuration
# Replaces GTT-based SL/TP with real-time tick monitoring and immediate market order execution
# This eliminates GTT limit order lag and provides faster execution in volatile options markets
POSITION_MANAGEMENT:
  ENABLED: true  # Set to true to enable real-time position management (replaces GTT)
  
  # Periodic check settings (optimized for efficiency)
  CHECK_INTERVAL_SEC: 1.0  # Check positions every 1 second (when active)
  # Note: Checks only run when positions are active (95% of time = zero processing)
  
  # Gap detection (immediate triggering)
  GAP_DETECTION:
    ENABLED: true
    GAP_THRESHOLD_PERCENT: 2.0  # Check immediately if price moves >2% in single tick
    # This ensures we catch rapid movements even between periodic checks
  
  # Exit execution settings
  EXIT_EXECUTION:
    ORDER_TYPE: "MARKET"  # Always use MARKET orders
    MAX_RETRIES: 3  # Retry failed orders
    RETRY_DELAY_MS: 500  # Delay between retries
    
  # Position validation
  VALIDATION:
    ENABLED: true
    MAX_RETRIES: 5
    RETRY_INTERVAL_MS: 500
    
  # Performance tuning
  PERFORMANCE:
    MAX_CONCURRENT_CHECKS: 10  # Limit concurrent position checks
    BATCH_SIZE: 5  # Process positions in batches
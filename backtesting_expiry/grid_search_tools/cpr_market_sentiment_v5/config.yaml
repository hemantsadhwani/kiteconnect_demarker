# CPR Market Sentiment Analysis Configuration

# Optional: generate_cpr_dates.py "new day only" mode.
# Set to a single date (YYYY-MM-DD) to fetch only that date: appended at end of cpr_dates.csv
# if new; same row updated if run twice for the same date. Comment out for full run.
# NEW_DAY: "2025-02-23"

# Date mappings: day_label -> expiry_week
# Format: day_label (lowercase, e.g., nov21) -> expiry_week (uppercase, e.g., NOV25)
# Used for finding input files in respective dynamic/static folders
# Generated from backtesting_expiry/data (all {EXPIRY}_DYNAMIC and _STATIC day folders).
# When a day appears under multiple expiry folders, mapped to expiry_week that matches the day.
DATE_MAPPINGS:
  # OCT20 (data: OCT20_DYNAMIC/OCT20)
  oct20: OCT20

  # OCT28 (data: OCT28_DYNAMIC/OCT28)
  oct28: OCT28

  # NOV04 (data: NOV04_DYNAMIC/NOV04; also under JAN13)
  nov04: NOV04

  # NOV11 (data: NOV11_DYNAMIC/NOV11; also under JAN13)
  nov11: NOV11

  # NOV18 (data: NOV18_DYNAMIC/NOV18; also under JAN13)
  nov18: NOV18

  # NOV25 (data: NOV25_DYNAMIC/NOV25; also under JAN13)
  nov25: NOV25

  # DEC09 (data: DEC09_DYNAMIC/DEC09; also under JAN13)
  dec09: DEC09

  # DEC23 (data: DEC23_DYNAMIC/DEC23, DEC30; JAN06 has DEC23, DEC31, JAN01–JAN06)
  dec23: DEC23
  # JAN13 (data: JAN13_DYNAMIC/JAN13)
  jan13: JAN13

  # JAN20 (data: JAN20_DYNAMIC/JAN20)
  jan20: JAN20

  # JAN27 (data: JAN27_DYNAMIC/JAN27)
  jan27: JAN27

  # FEB03 (data: FEB03_DYNAMIC/FEB03)
  feb03: FEB03

  # FEB10 (data: FEB10_DYNAMIC/FEB10)
  feb10: FEB10

  # FEB17 (data: FEB17_DYNAMIC/FEB17)
  feb17: FEB17



# Realtime alignment: sentiment of candle T is only known when T closes (at start of T+1).
# Workflow file (nifty_market_sentiment_<date>.csv) – used by backtest:
#   true:  row at time T = sentiment computed from candle T-1 (realtime: at T we have T-1's sentiment). Use for production-like backtest.
#   false: row at time T = sentiment of candle T (1:1, lookahead). Plot file (*_plot.csv) is always 1:1 for visualization.
# When true, PnL typically drops because lookahead bias is removed.
LAG_SENTIMENT_BY_ONE: true

# Visualization
PLOT_ENABLED: true

# Logging
VERBOSE_SWING_LOGGING: true  # Set to true for detailed swing detection logs